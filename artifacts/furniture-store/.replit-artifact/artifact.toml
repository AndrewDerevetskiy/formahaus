kind = "web"
previewPath = "/"
title = "3D Furniture Store"
version = "1.0.0"
id = "artifacts/furniture-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23155

[services.development]
run = "pnpm --filter @workspace/furniture-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/furniture-store", "run", "build" ]
publicDir = "artifacts/furniture-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23155"
BASE_PATH = "/"
